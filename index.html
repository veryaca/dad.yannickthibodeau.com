<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Michel Thibodeau</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
        <style>
            *, *::before, *::after
                { box-sizing:border-box; margin:0; padding:0; }
            html, body
                { height:100%; }
            body
                { align-items:center; background-color:#F7F5F1; display:flex;font-family:'Lato', sans-serif; justify-content:center; min-height:100vh; }
            .card
                { max-width:540px; padding:4rem 3rem; text-align:center; width:100%; }
            .cross
                { color:#A89880; font-family:'Lato', sans-serif; font-size:1.1rem; font-weight:300; letter-spacing:0.15em; margin-bottom:2.8rem; }
            .name
                { color:#2E2A26; font-family:'Playfair Display', serif; font-size:3rem; font-weight:900; letter-spacing:0.04em; line-height:1.15; margin-bottom:2.4rem; }
            .dates
                { color:#7A6E63; font-family:'Playfair Display', serif; font-size:1.15rem; font-style:italic; font-weight:300; letter-spacing:0.06em; line-height:2.1; }
        </style>
    </head>
    <body>
        <div class="card">
            <h1 class="name">Michel Thibodeau</h1>
            <div class="cross">✦</div>
            <div class="dates">
                25 février 1956 — 30 novembre 2022
            </div>
        </div>
    </body>
</html>
